name: Build Android AAB (Google Play)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Web Application
        run: npm run build

      - name: Sync Assets to Capacitor Android
        run: npx cap sync android

      - name: Decode Android Keystore (Optional)
        id: decode_keystore
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is empty. Building an UNSIGNED .aab file."
            echo "signed=false" >> $GITHUB_OUTPUT
          else
            echo "Decoding release keystore..."
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
            echo "signed=true" >> $GITHUB_OUTPUT
          fi

      - name: Build Android App Bundle (AAB)
        run: |
          cd android
          chmod +x gradlew
          if [ "${{ steps.decode_keystore.outputs.signed }}" == "true" ]; then
            # Build signed bundle using env variables
            ./gradlew bundleRelease \
              -Pandroid.injected.signing.store.file=release.keystore \
              -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
              -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
              -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"
          else
            # Build unsigned bundle
            ./gradlew bundleRelease
          fi

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 14
